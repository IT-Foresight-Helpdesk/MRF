<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Service Request Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #08ac9c, #764ba2);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }
    .form-container {
      background-color: #fff;
      color: #333;
      padding: 1.5rem;
      border-radius: 12px;
      max-width: 600px;
      width: 95%;
      box-shadow: 0 5px 15px rgba(0,0,0,.2);
    }
    .form-title {
      text-align: center;
      color: #08ac9c;
      font-weight: bold;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    .submit-button {
      background: linear-gradient(90deg, #08ac9c, #764ba2);
      color:#fff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
    }
    .submit-button:hover { opacity: .95; }
    .loading-text {
      text-align:center;
      color:#4a5568;
      font-size:.9rem;
      margin-top:10px;
      display:none;
    }
    footer {
      background: linear-gradient(90deg, #08ac9c, #764ba2);
      color:#fff;
      text-align:center;
      padding:10px;
      font-size:.9rem;
    }
  </style>
</head>
<body>
  <nav class="p-4 flex justify-between flex-wrap" style="background: linear-gradient(90deg, #08ac9c, #764ba2); color: white;">
    <a href="index.html" class="text-lg font-bold hover:text-yellow-400">Foresight IT Department</a>
    <div class="flex gap-4 flex-wrap justify-center">
      <a href="it-support.html" class="font-bold no-underline hover:text-yellow-400">IT Maintenance Form</a>
      <a href="basic-troubleshoot.html" class="font-bold no-underline hover:text-yellow-400">Basic Troubleshoot</a>
    </div>
  </nav>

  <div class="content">
    <div class="form-container">
      <h2 class="form-title">IT Service Request Form</h2>

      <form id="requestForm" method="POST" action="success.html">
        <div class="mt-3">
          <label>Full Name *</label>
          <input type="text" name="name" placeholder="Full Name" required class="w-full border p-2 rounded" />
        </div>

        <div class="mt-3">
          <label>Department *</label>
          <select name="department" required class="w-full border p-2 rounded">
            <option value="">-- Select a department --</option>
            <option>HRA</option>
            <option>Finance</option>
            <option>Procurement</option>
            <option>Commercial</option>
            <option>Operation</option>
            <option>QAQC</option>
            <option>Foresight Dialysis</option>
            <option>Product Engineering</option>
            <option>Business Development</option>
            <option>Regulatory Affairs</option>
            <option>Other</option>
          </select>
        </div>

        <div class="mt-3">
          <label>Email</label>
          <input type="email" name="email" placeholder="Need to use Email Company" class="w-full border p-2 rounded" />
        </div>

        <div class="mt-3">
          <label>Phone Number *</label>
          <input type="tel" name="phone" placeholder="0123456789" required class="w-full border p-2 rounded" />
        </div>

        <div class="mt-3">
          <label>Request Category *</label>
          <select name="category" required class="w-full border p-2 rounded">
            <option value="">-- Select a category --</option>
            <option>Software</option>
            <option>Printer</option>
            <option>Computer</option>
            <option>Laptop</option>
            <option>Network / Internet</option>
            <option>Email / Account</option>
            <option>Accessories</option>
            <option>Other</option>
          </select>
        </div>

        <div class="mt-3">
          <label>Request Details / Description *</label>
          <textarea
            name="description"
            rows="5"
            required
            class="w-full border p-2 rounded"
            placeholder="Sila jelaskan permintaan anda dengan jelas:

Contoh:
- Software: Adobe Acrobat untuk edit PDF
- Printer: Setup printer di Finance department
- Laptop: Request laptop baru untuk staff baru
- Network: Install LAN point di bilik meeting

Nyatakan juga lokasi / user terlibat jika ada."></textarea>
        </div>

        <button type="submit" class="submit-button mt-4" id="submitBtn">Submit Request</button>
        <div class="loading-text" id="loadingText">⏳ Submitting your request, please wait...</div>
      </form>
    </div>
  </div>

  <footer>© 2025 Haziq IT Department Foresight</footer>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQE3XB6t_jw172_-EOASmVxtAffsH0dDZ40_9PFn2Zd2wrZRepSs0CAxYYB58IeaE/exec";

    (function () {
      const form = document.getElementById('requestForm');
      const submitBtn = document.getElementById('submitBtn');
      const loadingText = document.getElementById('loadingText');

      let isSubmitting = false;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (isSubmitting) return;
        isSubmitting = true;

        loadingText.style.display = 'block';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        const fd = new FormData(form);
        const payload = new URLSearchParams();

        for (const [key, value] of fd.entries()) {
          payload.append(key, value);
        }

        payload.append("type", "request");

        try {
          const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
            },
            body: payload.toString()
          });

          const resultText = await response.text();
          console.log(resultText);

          window.location.href = "success.html";
        } catch (error) {
          console.error(error);
          alert("Submission failed. Please try again.");
          isSubmitting = false;
          loadingText.style.display = 'none';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Submit Request';
        }
      });
    })();
  </script>
</body>
</html>
